<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0c0d10"><title>Index Inbox</title><link rel="manifest" href="/manifest.webmanifest?v=16.3"><link rel="icon" href="/icon.svg"><link rel="stylesheet" href="/style.css?v=16.3"></head><body>
<header><div><span class="ring">◉</span><h1>Index Inbox</h1><small class="version">v0.16.3</small></div><nav><button id="install" hidden>Install</button><button id="logout" hidden>Sign out</button></nav></header>
<main><section id="signed-out" class="empty"><form id="login-form" class="card login"><h2 id="login-title">Your thoughts, on your server.</h2><p id="setup-help" hidden>Create the first local owner account using the one-time setup token from your server configuration.</p><input id="setup-token" type="password" autocomplete="off" placeholder="Setup token" hidden><input id="username" autocomplete="username" placeholder="Username" required><input id="password" type="password" autocomplete="current-password" placeholder="Password" required><input id="password-confirmation" type="password" autocomplete="new-password" placeholder="Confirm password" hidden><button id="login-submit">Sign in</button><p id="login-error" class="error"></p></form></section>
<section id="app" hidden>
 <div class="toolbar"><input id="search" type="search" placeholder="Search…"><button id="capture">＋ Capture</button><button id="refresh">↻</button></div>
 <div class="filters"><select id="category"><option value="">All categories</option><option>note</option><option>task</option><option>idea</option><option>question</option></select><select id="group"><option value="">All groups</option></select><select id="state"><option value="active">Active</option><option value="archived">Archived</option><option value="unprocessed">Unprocessed</option><option value="starred">Starred</option><option value="all">All</option></select><button id="groups-open">Manage groups</button><button id="activity-open">Activity</button><button id="status-open">Storage & export</button></div>
 <div id="bulk" hidden><b id="selected-count"></b><button data-action="process">Process</button><button data-action="archive">Archive</button><button data-action="restore">Restore</button><button id="bulk-delete">Delete</button></div>
 <div id="entries"></div><div id="empty" class="empty" hidden><h2>No matching entries</h2></div>
 <div class="pager"><button id="prev">Previous</button><span id="page"></span><button id="next">Next</button></div>
</section></main>
<dialog id="capture-dialog"><form id="capture-form"><h2>New capture</h2><textarea id="manual-text" rows="6" placeholder="What do you want to remember?" required></textarea><select id="manual-category"><option>note</option><option>task</option><option>idea</option><option>question</option></select><div><button type="button" id="record">● Record audio</button><span id="record-status"></span></div><div class="dialog-actions"><button type="button" data-close>Cancel</button><button>Save</button></div></form></dialog>
<dialog id="info-dialog"><button class="close" data-close>×</button><div id="info"></div></dialog>
<dialog id="confirm-dialog"><form id="confirm-form"><h2 id="confirm-title">Confirm</h2><p id="confirm-message"></p><input id="confirm-input" hidden><div class="dialog-actions"><button type="button" id="confirm-cancel">Cancel</button><button id="confirm-ok">Confirm</button></div></form></dialog>
<template id="entry-template"><article class="card"><div class="meta"><input class="select" type="checkbox"><time></time><span class="category"></span><span class="audio-mark" hidden>♪ audio</span><button class="star">☆</button></div><textarea class="text"></textarea><audio controls hidden></audio><div class="speed" hidden>Speed <button data-speed="1">1×</button><button data-speed="1.5">1.5×</button><button data-speed="2">2×</button><button class="download">Download</button></div><div class="actions"><input class="tags" placeholder="tags, comma-separated"><select class="group-edit"><option value="">Standalone</option></select><select class="category-edit"><option>note</option><option>task</option><option>idea</option><option>question</option></select><label><input class="processed" type="checkbox"> Processed</label><button class="payload">Payload</button><button class="archive">Archive</button><button class="delete">Delete</button></div></article></template>
<div id="capture-notices" aria-live="polite" aria-atomic="false"></div>
<script src="/config.js?v=16.3"></script><script type="module" src="/app.js?v=16.3"></script></body></html>
